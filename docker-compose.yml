version: "3.8"

services:
  # MongoDB Replica Set Nodes
  mongo1:
    image: mongo:6.0
    container_name: mongo1
    hostname: mongo1
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27011:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopee-network

  mongo2:
    image: mongo:6.0
    container_name: mongo2
    hostname: mongo2
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27012:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopee-network

  mongo3:
    image: mongo:6.0
    container_name: mongo3
    hostname: mongo3
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27013:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopee-network

  mongo-init:
    image: mongo:6.0
    container_name: mongo-init
    depends_on:
      mongo1: { condition: service_healthy }
      mongo2: { condition: service_healthy }
      mongo3: { condition: service_healthy }
    restart: "no"
    entrypoint: >
      mongosh --host mongo1:27017 --eval 
      "try { rs.status(); } catch(e) { rs.initiate({_id:'dbrs',members:[{_id:0,host:'mongo1:27017'},{_id:1,host:'mongo2:27017'},{_id:2,host:'mongo3:27017'}]}); }"
    networks:
      - shopee-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - shopee-network

  # Kafka & Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - shopee-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - shopee-network

  # Microservices
  auth-service:
    build: { context: ., dockerfile: services/auth-service/Dockerfile }
    container_name: auth-service
    ports: ["5050:5050"]
    environment:
      - PORT=5050
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
      - JWT_SECRET=quan_ptit_2026_pro_key
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on: [redis, kafka]
    networks: [shopee-network]

  product-service:
    build: { context: ., dockerfile: services/product-service/Dockerfile }
    container_name: product-service
    ports: ["5001:5001"]
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on: [redis, kafka]
    networks: [shopee-network]

  cart-service:
    build: { context: ., dockerfile: services/cart-service/Dockerfile }
    container_name: cart-service
    ports: ["5002:5002"]
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
    depends_on: [kafka, redis]
    networks: [shopee-network]

  order-service:
    build: { context: ., dockerfile: services/order-service/Dockerfile }
    container_name: order-service
    ports: ["5003:5003"]
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PRODUCT_SERVICE_URL=http://product-service:5001
      - REDIS_HOST=redis
    depends_on: [kafka, redis]
    networks: [shopee-network]

  payment-service:
    build: { context: ., dockerfile: services/payment-service/Dockerfile }
    container_name: payment-service
    ports: ["5004:5004"]
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
    depends_on: [kafka, redis]
    networks: [shopee-network]

  notification-service:
    build: { context: ., dockerfile: services/notification-service/Dockerfile }
    container_name: notification-service
    environment:
      - MONGO_URI=mongodb://admin:Lyhaiquan2005%40@157.245.99.196:27000/ecommerce_db?authSource=admin
    depends_on: [mongo-init]
    networks: [shopee-network]

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports: ["8081:8080"]
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [auth-service, product-service, order-service]
    networks: [shopee-network]

networks:
  shopee-network:
    driver: bridge
