version: "3.8"

services:
  # ==========================================
  # 1. HẠ TẦNG (INFRASTRUCTURE)
  # ==========================================
  # MongoDB Node 1 (Primary potential)
  mongo1:
    image: mongo:6.0
    container_name: mongo1
    hostname: mongo1
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27011"]
    ports:
      - "27011:27011"
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27011",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Node 2
  mongo2:
    image: mongo:6.0
    container_name: mongo2
    hostname: mongo2
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27012"]
    ports:
      - "27012:27012"
    volumes:
      - mongo2_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27012",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Node 3
  mongo3:
    image: mongo:6.0
    container_name: mongo3
    hostname: mongo3
    command: ["mongod", "--replSet", "dbrs", "--bind_ip_all", "--port", "27013"]
    ports:
      - "27013:27013"
    volumes:
      - mongo3_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27013",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tự động khởi tạo Replica Set
  mongo-init:
    image: mongo:6.0
    container_name: mongo-init
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh --host mongo1:27011 --eval 
      "
      try { 
        if (rs.status().ok) {
          print('Replica Set đã được cấu hình trước đó.');
        }
      } catch(e) { 
        print('Bắt đầu khởi tạo Replica Set dbrs...');
        rs.initiate({ 
          _id: 'dbrs', 
          members: [
            { _id: 0, host: 'mongo1:27011', priority: 2 },
            { _id: 1, host: 'mongo2:27012', priority: 1 },
            { _id: 2, host: 'mongo3:27013', priority: 1 }
          ] 
        }); 
        print('Khởi tạo thành công!');
      }
      "

  # Redis
  redis:
    image: redis:7.0-alpine
    container_name: shopee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo-init

  # ==========================================
  # 2. MICROSERVICES (ỨNG DỤNG SHOPEE CLONE)
  # ==========================================

  product-service:
    build: ./services/product
    container_name: product-service
    restart: always
    ports:
      - "${PRODUCT_PORT}:${PRODUCT_PORT}"
    environment:
      - PORT=${PRODUCT_PORT}
      - NODE_ENV=${NODE_ENV}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      - mongo-init
      - kafka

  cart-service:
    build: ./services/cart
    container_name: cart-service
    restart: always
    ports:
      - "${CART_PORT}:${CART_PORT}"
    environment:
      - PORT=${CART_PORT}
      - NODE_ENV=${NODE_ENV}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL}
    depends_on:
      - mongo-init
      - product-service

  order-service:
    build: ./services/order
    container_name: order-service
    restart: always
    ports:
      - "${ORDER_PORT}:${ORDER_PORT}"
    environment:
      - PORT=${ORDER_PORT}
      - NODE_ENV=${NODE_ENV}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo-init
      - kafka

  payment-service:
    build: ./services/payment
    container_name: payment-service
    restart: always
    ports:
      - "${PAYMENT_PORT}:${PAYMENT_PORT}"
    environment:
      - PORT=${PAYMENT_PORT}
      - NODE_ENV=${NODE_ENV}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
      - VNP_TMN_CODE=${VNP_TMN_CODE}
      - VNP_HASH_SECRET=${VNP_HASH_SECRET}
      - VNP_URL=${VNP_URL}
      - VNP_RETURN_URL=${VNP_RETURN_URL}
    depends_on:
      - mongo-init

  auth-service:
    build: ./services/auth # Hoặc đường dẫn tương ứng của bạn
    container_name: auth-service
    restart: always
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      - PORT=${AUTH_PORT}
      - NODE_ENV=${NODE_ENV}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    depends_on:
      - mongo-init

networks:
  default:
    name: shopee-network

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  redis_data:
