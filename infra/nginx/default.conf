server {
    listen 8080;
    server_name localhost;

    client_max_body_size 50M;

    # Headers dùng chung cho tất cả proxy
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Auth Service
    location /api/auth/ {
        # Xử lý Preflight request (OPTIONS) cho CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;

        # BỎ dấu gạch chéo ở cuối proxy_pass nếu code Backend của Quân 
        # đã có app.use('/api/auth', ...)
        proxy_pass http://auth-service:5050; 
    }

    # 2. Product Service (Sửa thành số nhiều: /products/)
    location /api/products/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        
        # BỎ dấu gạch chéo ở cuối
        proxy_pass http://product-service:5001;
    }

    # 3. Cart Service
    location /api/cart/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        proxy_pass http://cart-service:5002;
    }

    # 4. Order Service
    location /api/orders/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        proxy_pass http://order-service:5003;
    }

    # 5. Payment Service
    location /api/payments/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        proxy_pass http://payment-service:5004;
    }

    # Route mặc định
    location / {
        return 404 "Shopee Clone API Gateway - Route not found";
    }
}